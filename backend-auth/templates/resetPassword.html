<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #2563eb;">Password Reset</h2>
  <p>Hi {{name}},</p>
  <p>We received a request to reset your password. Click the button below to choose a new password:</p>
  <p style="text-align: center; margin: 30px 0;">
    <a href="{{resetUrl}}" style="background-color: #2563eb; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 6px; display: inline-block;">
      Reset Password
    </a>
  </p>
  <p>Or copy and paste this link into your browser:</p>
  <p style="word-break: break-all; color: #666;">{{resetUrl}}</p>
  <p style="color: #888; font-size: 14px;">This link expires in 1 hour. If you did not request a reset, you can ignore this email.</p>
</body>
</html>
